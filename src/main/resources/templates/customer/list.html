<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Ledger Book</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-4">
      <div class="card shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h3 class="mb-0">Ledger Book</h3>

          <a th:href="@{/customers/new}" class="btn btn-primary">
            Add Customer
          </a>
        </div>

        <div class="card-body">
          <form method="get" class="mb-3">
            <input
              type="text"
              name="keyword"
              class="form-control"
              placeholder="Search customer..."
            />
          </form>

          <div class="table-responsive">
            <table class="table table-hover align-middle  table-striped">
              <thead class="table-dark">
                <tr>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Mobile</th>
                  <th>Address</th>
                  <th>Balance</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody>
                <tr th:each="customer : ${customers}">
                  <td th:text="${customer.firstName}"></td>
                  <td th:text="${customer.lastName}"></td>

                  <td th:text="${customer.mobile}"></td>

                  <td th:text="${customer.address}"></td>
                  <td>
                    <span> 10</span>
                    <!--    class="badge"
                      th:classappend="${entry.balance.signum() < 0}
                    ? ' bg-danger'
                    : ' bg-success'"
                      th:text="${entry.balance}"
                    >  -->
                  </td>

                  <td>
                    <div
                      class="btn d-flex justify-content-between"
                      role="group"
                    >
                      <a
                        class="btn btn-sm btn-info"
                        th:href="@{/customers/{id}(id=${customer.id})}"
                      >
                        <i class="bi bi-eye"></i>
                        View
                      </a>

                      <a
                        class="btn btn-sm btn-warning"
                        th:href="@{/customers/edit/{id}(id=${customer.id})}"
                      >
                        <i class="bi bi-pencil"></i>
                        Edit
                      </a>

                      <a
                        class="btn btn-sm btn-danger"
                        th:href="@{/customers/delete/{id}(id=${customer.id})}"
                        onclick="return confirm('Delete customer?');"
                      >
                        <i class="bi bi-trash"></i>
                        Delete
                      </a>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
